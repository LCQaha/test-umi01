name: Deploy Umi to GitHub Pages

on:
  push:
    branches: ["master", "main"] # 当你推送到 main 或 master 分支时触发

# 赋予 GitHub Actions 写入 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码 (Checkout)
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖 (npm install)
        run: npm install

      - name: 编译打包 (npm run build)
        run: npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传打包产物 (dist 文件夹)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 这里指定只发布 dist 文件夹里的内容

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4